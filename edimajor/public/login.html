<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Login - Ediglobe Secure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .error-message {
            background: #fde8e8;
            color: #e74c3c;
            border-left: 4px solid #e74c3c;
        }

        .success-message {
            background: #e8f8f0;
            color: #27ae60;
            border-left: 4px solid #27ae60;
        }

        .security-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Secure Login</h2>
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email Address" required autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn">Login</button>
        </form>
        <div id="errorMessage" class="message error-message"></div>
        <div id="successMessage" class="message success-message"></div>
        <div class="links">
            <a href="signup.html">Don't have an account? Sign Up</a>
        </div>
    </div>
    <div class="security-info">
        🔒 Secure Connection | All data encrypted
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDisplay = document.getElementById('errorMessage');
        const successDisplay = document.getElementById('successMessage');
        
        // Disable form submission on Enter key until validation
        let isSubmitting = false;
        
        // Rate limiting
        let attempts = 0;
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_TIME = 15 * 60 * 1000; // 15 minutes
        
        function getRemainingAttempts() {
            const stored = localStorage.getItem('loginAttempts');
            if (!stored) return MAX_ATTEMPTS;
            
            const data = JSON.parse(stored);
            if (Date.now() - data.timestamp > LOCKOUT_TIME) {
                localStorage.removeItem('loginAttempts');
                return MAX_ATTEMPTS;
            }
            
            return MAX_ATTEMPTS - data.count;
        }
        
        function recordFailedAttempt() {
            const stored = localStorage.getItem('loginAttempts');
            let count = 1;
            let timestamp = Date.now();
            
            if (stored) {
                const data = JSON.parse(stored);
                if (Date.now() - data.timestamp <= LOCKOUT_TIME) {
                    count = data.count + 1;
                    timestamp = data.timestamp;
                }
            }
            
            localStorage.setItem('loginAttempts', JSON.stringify({
                count: count,
                timestamp: timestamp
            }));
        }
        
        function resetAttempts() {
            localStorage.removeItem('loginAttempts');
        }
        
        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            
            // Check rate limiting
            const remainingAttempts = getRemainingAttempts();
            if (remainingAttempts <= 0) {
                errorDisplay.textContent = `Too many failed attempts. Please wait ${Math.ceil(LOCKOUT_TIME / 60000)} minutes.`;
                errorDisplay.style.display = 'block';
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Clear previous messages
            errorDisplay.style.display = 'none';
            successDisplay.style.display = 'none';
            
            // Client-side validation
            if (!email || !password) {
                errorDisplay.textContent = "Please fill in all fields.";
                errorDisplay.style.display = 'block';
                return;
            }
            
            // Email format validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorDisplay.textContent = "Please enter a valid email address.";
                errorDisplay.style.display = 'block';
                return;
            }
            
            // Show loading state
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.textContent = "Logging in...";
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resetAttempts();
                    // Store only necessary data
                    localStorage.setItem("username", email);
                    successDisplay.textContent = data.message;
                    successDisplay.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href ="dashboard.html";
                    }, 1000);
                } else {
                    recordFailedAttempt();
                    errorDisplay.textContent = data.error || "Login failed. Please try again.";
                    errorDisplay.style.display = 'block';
                    
                    // Update remaining attempts
                    const remaining = getRemainingAttempts();
                    if (remaining > 0) {
                        errorDisplay.textContent += ` (${remaining} attempts remaining)`;
                    }
                }
            } catch (error) {
                console.error("Login error:", error);
                errorDisplay.textContent = "Network error. Please check your connection.";
                errorDisplay.style.display = 'block';
            } finally {
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.textContent = "Login";
            }
        });
        
        // Clear messages on input
        document.getElementById('email').addEventListener('input', () => {
            errorDisplay.style.display = 'none';
            successDisplay.style.display = 'none';
        });
        
        document.getElementById('password').addEventListener('input', () => {
            errorDisplay.style.display = 'none';
            successDisplay.style.display = 'none';
        });
    </script>
</body>
</html>
